[project]
name = "finance-tracker"
version = "0.1.0"
description = "This is the finance-tracker package for managing personal finances!"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "datetime",
    "pandas-stubs",
    "st-supabase-connection",
    "streamlit",
    "streamlit-extras",
]

[dependency-groups]
dev = [
    "mypy",
    "pytest",
    "ruff",
]

[tool.mypy]
strict = true
python_version = "3.12"
disable_error_code = "import-untyped"
ignore_missing_imports = true
plugins = ['pydantic.mypy']
explicit_package_bases = true
