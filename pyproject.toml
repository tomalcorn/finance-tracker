[project]
name = "finance-tracker"
version = "0.1.0"
description = "This is the finance-tracker package for managing personal finances!"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "datetime",
    "pandas-stubs",
    "st-supabase-connection",
    "streamlit",
    "streamlit-extras",
]

[dependency-groups]
dev = [
    "pytest",
    "ruff",
    "ty",
]

[tool.ty.src]
# To be removed in #23
exclude = ["src/libs/dataframe_handling.py"]
