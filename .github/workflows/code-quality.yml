name: Python Code Quality
env:
  PYTHONPATH: "${{ github.workspace }}"
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  lock_file:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: uv lock --locked
  linting:
    runs-on: ubuntu-latest
    needs: [lock_file]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: Check tool versions
        run: |
          uv --version
          uv run ruff --version
          uvx ruff --version
      - run: uv run ruff check --show-settings 2>&1 | head -60
  formatting:
    runs-on: ubuntu-latest
    needs: [lock_file]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: Check tool versions
        run: |
          uv --version
          uv run ruff --version
          uvx ruff --version
      - run: uv run ruff format --check .
  type_consistency:
    runs-on: ubuntu-latest
    needs: [lock_file]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: uv run ty check
  tests:
    runs-on: ubuntu-latest
    needs: [lock_file]
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: uv run pytest -v
  build:
    runs-on: ubuntu-latest
    needs: [lock_file, linting, formatting, type_consistency, tests]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: uv build
