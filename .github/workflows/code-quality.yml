name: Python Code Quality
env:
  PYTHONPATH: "${{ github.workspace }}"
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  lock_file:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: uv lock --locked
  linting:
    runs-on: ubuntu-latest
    needs: [lock_file]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: Check tool versions
        run: |
          uv --version
          uv run ruff --version
          uvx ruff --version
      - run: uv run ruff check .
  formatting:
    runs-on: ubuntu-latest
    needs: [lock_file]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: Check tool versions
        run: |
          uv --version
          uv run ruff --version
          uvx ruff --version
      - run: uv run ruff format --check .
  type_consistency:
    runs-on: ubuntu-latest
    needs: [lock_file]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: uv run ty check
  tests:
    runs-on: ubuntu-latest
    needs: [lock_file]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: Write secrets file
        run: |
          mkdir -p .streamlit
          cat > .streamlit/secrets.toml <<'EOF'
          ${{ secrets.SECRETS_TOML }}
          EOF
      - name: Verify secret exists
        run: |
          python - <<'PY'
          import streamlit as st

          print("jwt exists:", bool(st.secrets["supabase_admin"]["jwt_secret"]))
          print("jwt length:", len(st.secrets["supabase_admin"]["jwt_secret"]))
          PY
      - run: uv run pytest -v
  build:
    runs-on: ubuntu-latest
    needs: [lock_file, linting, formatting, type_consistency, tests]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: uv build
